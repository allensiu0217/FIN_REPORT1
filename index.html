<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股全維度深度分析系統 (AI-Powered)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Markdown 內容排版樣式優化 */
        .prose h1, .prose h2, .prose h3 { color: #f8fafc; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #334155; padding-bottom: 0.3em; }
        .prose p { margin-bottom: 1em; color: #cbd5e1; line-height: 1.7; }
        .prose ul { list-style-type: disc; margin-left: 1.5em; margin-bottom: 1em; color: #cbd5e1; }
        .prose li { margin-bottom: 0.25em; }
        .prose strong { color: #38bdf8; font-weight: 600; }
        .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 1em; color: #94a3b8; font-style: italic; background: rgba(59, 130, 246, 0.1); padding: 0.5em 1em; border-radius: 0 0.25rem 0.25rem 0;}
        .prose code { background: #1e293b; padding: 0.2em 0.4em; border-radius: 0.25em; color: #fb7185; }
        
        /* 評分條動畫 */
        .score-bar { transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* 載入動畫 */
        .loader {
            border: 3px solid #1e293b;
            border-bottom-color: #38bdf8;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-10">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 mb-4">
                <i class="fa-solid fa-chart-line mr-3"></i>美股全維度深度分析系統
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-sm md:text-base">
                基於 Morningstar 護城河、DuPont 杜邦分析、極壓測試與 DCF 估值模型的 AI 投研引擎。<br>
                <span class="text-xs text-blue-400 mt-2 inline-block"><i class="fa-solid fa-shield-halved mr-1"></i> 已啟用：嚴格事實查核模式與防幻覺機制</span>
            </p>
        </header>

        <!-- Input Section -->
        <div class="bg-slate-800 p-6 md:p-8 rounded-2xl shadow-xl border border-slate-700 mb-10 max-w-2xl mx-auto relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-cyan-400"></div>
            <form id="analyzeForm" class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" id="tickerInput" required placeholder="輸入美股代號 (如: AAPL, TSLA, NVDA)" 
                           class="w-full bg-slate-900 border border-slate-600 text-white rounded-xl pl-12 pr-4 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent uppercase font-semibold tracking-wider transition-all">
                </div>
                <button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-xl transition-colors duration-200 shadow-lg shadow-blue-500/30 flex items-center justify-center min-w-[140px]">
                    <span>開始分析</span>
                    <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>
            <div id="errorBox" class="hidden mt-4 bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg text-sm">
                <i class="fa-solid fa-triangle-exclamation mr-2"></i><span id="errorMsg">發生錯誤。</span>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex-col items-center justify-center py-20">
            <span class="loader w-16 h-16 mb-6"></span>
            <h3 class="text-xl font-semibold text-blue-400 mb-2">正在構建投研報告...</h3>
            <div class="text-slate-400 text-sm space-y-1 text-center">
                <p class="animate-pulse">正在掃描最新財報與 13F 機構持倉...</p>
                <p class="animate-pulse" style="animation-delay: 0.5s;">執行 Morningstar 護城河評估...</p>
                <p class="animate-pulse" style="animation-delay: 1s;">計算 DCF 估值與極壓測試模型...</p>
            </div>
        </div>

        <!-- Results Section (Hidden by default) -->
        <div id="resultsContainer" class="hidden space-y-8 animate-[fadeIn_0.5s_ease-in-out]">
            
            <div class="flex items-center justify-between border-b border-slate-700 pb-4">
                <h2 class="text-3xl font-bold flex items-center">
                    <span id="resultTicker" class="text-blue-400 mr-3">AAPL</span> 分析摘要
                </h2>
            </div>

            <!-- Top Dashboard: Summary & Scores -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Summary Card -->
                <div class="md:col-span-2 bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-lg">
                    <h3 class="text-lg font-semibold text-white mb-3 flex items-center">
                        <i class="fa-solid fa-book-open text-blue-400 mr-2"></i> 核心洞察 ( < 300字 )
                    </h3>
                    <p id="summaryText" class="text-slate-300 leading-relaxed text-justify"></p>
                </div>

                <!-- Scores Card -->
                <div class="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-lg flex flex-col justify-between">
                    <h3 class="text-lg font-semibold text-white mb-4 flex items-center">
                        <i class="fa-solid fa-chart-pie text-blue-400 mr-2"></i> 綜合評級 (1-10)
                    </h3>
                    
                    <div class="space-y-5">
                        <!-- Valuation Score -->
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-slate-300">估值吸引力</span>
                                <span id="scoreValText" class="font-bold text-blue-400">0/10</span>
                            </div>
                            <div class="w-full bg-slate-700 rounded-full h-2.5">
                                <div id="scoreValBar" class="bg-gradient-to-r from-green-400 to-blue-500 h-2.5 rounded-full score-bar w-0"></div>
                            </div>
                        </div>
                        
                        <!-- Growth Score -->
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-slate-300">增長潛力</span>
                                <span id="scoreGroText" class="font-bold text-blue-400">0/10</span>
                            </div>
                            <div class="w-full bg-slate-700 rounded-full h-2.5">
                                <div id="scoreGroBar" class="bg-gradient-to-r from-blue-400 to-purple-500 h-2.5 rounded-full score-bar w-0"></div>
                            </div>
                        </div>

                        <!-- Risk Score -->
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-slate-300">財務安全性 (分數越高越安全)</span>
                                <span id="scoreRisText" class="font-bold text-blue-400">0/10</span>
                            </div>
                            <div class="w-full bg-slate-700 rounded-full h-2.5">
                                <div id="scoreRisBar" class="bg-gradient-to-r from-red-400 to-yellow-400 h-2.5 rounded-full score-bar w-0"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detailed Report Markdown Container -->
            <div class="bg-slate-850 rounded-2xl p-8 border border-slate-700 shadow-xl mt-8">
                <div id="markdownReport" class="prose max-w-none text-slate-300">
                    <!-- Markdown content injected here -->
                </div>
            </div>
            
        </div>
    </div>

    <script>
        // API Key 設定為空，由執行環境提供
        const apiKey = "";
        
        // 延遲函數，用於 Exponential Backoff
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 帶有 Exponential Backoff 的 Fetch 函數
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await sleep(delays[i]);
                }
            }
        }

        document.getElementById('analyzeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            if (!ticker) return;

            // UI 狀態切換
            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';

            try {
                // 系統指令：融入使用者的「專家優化」與「內部事實查核」原則，並強制聯網驗證
                const systemPrompt = `
你是一名深耕 AI 領域與金融市場的「頂尖美股分析師與價值投資顧問」。
【操作守則 - 內部事實查核與防幻覺程序】：
1. 【強制聯網驗證】：你必須使用 Google Search 工具查詢該股票代號的最新資訊（包含最新一季財報、13F報告、近期重大新聞）。
2. 【實體驗證】：在分析前，請先嚴格確認該股票代號是否為真實存在的「美股」上市公司。若查無此公司、代號已下市、屬於冷門粉紅單市場或非美股，請在 summary 與 reportMarkdown 欄位直接填寫：「【錯誤：查無此美股代號或公司資訊不足，請重新確認】」，並將評分皆設為 1。絕對嚴禁張冠李戴或憑空捏造。
3. 【指定數據源 - Forecast】：在進行「估值建模與長線預測」時，你必須優先搜尋 "site:stockanalysis.com [股票代號] forecast" 來獲取未來 1 至 2 年的營收 (Revenue) 與每股盈餘 (EPS) 分析師預測數據。
4. 【客觀評分錨定】：為了確保每次評分的一致性，你的 1-10 分必須嚴格基於客觀數據：
    - 估值分數：若 P/E 處於歷史低分位或低於行業均值給高分，反之給低分。
    - 增長分數：嚴格對照 StockAnalysis 的未來 1-2 年 EPS/營收年化成長率，高成長給高分。
    - 風險分數：嚴格考量「利息保障倍數」與「自由現金流轉正與否」，財務越穩健給越接近 10 分。
5. 【證據優先】：僅依據搜尋到的『確切已知』事實與最新財報數據回答，嚴禁使用『可能、應該、或許』等模糊推測。
6. 【允許留白】：這非常重要——如果你的信心水準低於 90%，或缺乏最新具體資訊（如具體的 DCF 預估數字等），請在該欄位或段落直接輸出：「【資料不足，無法確認】」，切勿捏造數據。
7. 【來源標註】：涉及具體數據、事件或指引，請註明推論邏輯或數據來源（如 "根據 Q3 財報" 或 "根據 StockAnalysis.com 預測"）。
8. 語言：強制使用繁體中文 (zh-TW) 輸出。
                `;

                // 用戶指令：詳細的分析框架
                const userQuery = `
請針對美股代號【${ticker}】進行深度分析，並嚴格依照以下 JSON Schema 輸出結構化資料。
分析內容要求：
1. 300字以內的綜合分析摘要。
2. 給予3方面綜合評分（1為極差/不建議，10為極佳/必買）：估值、增長潛力、公司財務風險。
3. 詳細的 Markdown 分析報告 (reportMarkdown)，必須包含以下所有標題與內容：

## 一、 商業模式與動態競爭
* **商業模式與獲利結構**：拆解主要收入來源，分析其定價權（Pricing Power）。
* **動態競爭優勢**：利用 Porter’s Five Forces 模型評估護城河是擴大（Widening）還是縮小。

## 二、 競爭壁壘（Economic Moat）
採用 Morningstar 框架，針對以下維度給予 1-10 分定量評分並說明定性理由：
* **無形資產**：品牌溢價能力、專利佈局、監管准入。
* **轉換成本**：客戶流失率（Churn Rate）與黏性。
* **網絡效應**：用戶基數增加如何提升平台價值。
* **成本優勢**：規模效應或獨特資源。
* **結構性優勢對比**：與 2 家主要競爭對手橫向對比，判斷未來 5 年可持續性。

## 三、 最新財報拆解與財務質量
* **數據對抗**：營收、EPS、毛利率與市場預期（Consensus）對比，指出具體 beat/miss 情況。
* **財報潛台詞**：管理層電話會議對未來指引（Guidance）的語氣變化。
* **非財務指標**：庫存周轉率、訂閱數或研發投入比的變化。
* **市場情緒解析**：財報後股價反應的底層邏輯。
* **財務基因演變 (過去5年)**：資本配置效率（FCF用途）、獲利含金量（營運現金流/淨利 > 1?）、槓桿結構。
* **DuPont Analysis 結論**：ROE 增長來源是利潤率、周轉率還是財務槓桿？

## 四、 成長股價值投資與極壓測試
* **核心投資論點 (Variant Perception)**：市場目前的定價為何錯誤？
* **籌碼面**：13F 報告中的機構持倉變動趨勢。
* **關鍵催化劑**：未來 6-12 個月內觸發估值修復的具體事件。
* **反面論點 (止損條件)**：何種情況下需承認判斷錯誤並果斷止損？
* **極壓測試矩陣 (按發生機率與影響程度排序)**：宏觀風險、微觀風險、尾部風險（黑天鵝），並提供投資者應監測的「先行指標」。

## 五、 估值建模與長線預測 (含 StockAnalysis 數據)
* **未來 1-2 年預測 (Forecast)**：基於 stockanalysis.com 的分析師共識，列出未來 12-24 個月的營收與 EPS 增長預期。
* **情境預測**：結合前述預測，建立 Base, Bull, Bear Case，給出未來 24 個月目標價及核心假設。
* **相對估值**：過去 5 年 P/E, P/S, EV/EBITDA 分位點位置。
* **絕對估值 (DCF)**：說明未來 5 年 FCF 增長率、WACC、終值倍數假設，計算內在價值。
* **安全邊際與操作建議**：折價幅度，並給出「買入區間」、「合理價位」、「減持區間」。
* **長期增長曲線**：TAM/SAM/SOM 量化、技術曲線轉化效率、潛在的第二增長曲線、單元經濟（邊際成本遞減）分析。
`;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    tools: [{ "google_search": {} }], // 啟用 Google Search 聯網查核
                    generationConfig: {
                        temperature: 0.2, // 關鍵更新：降低溫度，大幅提升每次評分與內容的一致性與可信度
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                summary: { type: "STRING", description: "300字以內的綜合分析摘要" },
                                scoreValuation: { type: "INTEGER", description: "估值吸引力評分 (1-10)" },
                                scoreGrowth: { type: "INTEGER", description: "增長潛力評分 (1-10)" },
                                scoreRisk: { type: "INTEGER", description: "財務安全性評分 (1-10，10代表最安全/極低風險)" },
                                reportMarkdown: { type: "STRING", description: "包含所有分析維度的詳細 Markdown 格式報告" }
                            },
                            required: ["summary", "scoreValuation", "scoreGrowth", "scoreRisk", "reportMarkdown"]
                        }
                    }
                };

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const data = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("無法生成分析報告，請稍後再試。");
                }

                const resultText = data.candidates[0].content.parts[0].text;
                const resultJson = JSON.parse(resultText);

                // 更新 UI 內容
                document.getElementById('resultTicker').textContent = ticker;
                document.getElementById('summaryText').textContent = resultJson.summary;
                
                // 動態設定評分條
                setScore('scoreVal', resultJson.scoreValuation);
                setScore('scoreGro', resultJson.scoreGrowth);
                setScore('scoreRis', resultJson.scoreRisk); // 假設模型理解 10 = 好/安全

                // 渲染 Markdown
                const parsedHTML = marked.parse(resultJson.reportMarkdown);
                document.getElementById('markdownReport').innerHTML = parsedHTML;

                // 顯示結果
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('resultsContainer').classList.remove('hidden');

            } catch (error) {
                console.error("Analysis Error:", error);
                document.getElementById('loadingState').classList.add('hidden');
                const errorBox = document.getElementById('errorBox');
                document.getElementById('errorMsg').textContent = `分析失敗：${error.message} (請確認您的網路連線或 API 狀態)`;
                errorBox.classList.remove('hidden');
            } finally {
                // 恢復按鈕狀態
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerHTML = '<span>重新分析</span><i class="fa-solid fa-arrow-rotate-right ml-2"></i>';
            }
        });

        // 設定評分動畫與數值
        function setScore(prefix, score) {
            // 確保分數在 1-10 之間
            const validScore = Math.max(1, Math.min(10, parseInt(score) || 0));
            document.getElementById(`${prefix}Text`).textContent = `${validScore}/10`;
            
            // 延遲一點點讓 CSS 動畫生效
            setTimeout(() => {
                document.getElementById(`${prefix}Bar`).style.width = `${(validScore / 10) * 100}%`;
                
                // 動態顏色 (可選，目前使用漸層背景，若要動態改變底色可在此調整)
                const bar = document.getElementById(`${prefix}Bar`);
                if(validScore <= 3) {
                    bar.style.background = 'linear-gradient(to right, #f87171, #ef4444)';
                } else if(validScore <= 7) {
                    bar.style.background = 'linear-gradient(to right, #facc15, #eab308)';
                } else {
                    bar.style.background = 'linear-gradient(to right, #4ade80, #3b82f6)';
                }
            }, 100);
        }
    </script>
</body>
</html>
